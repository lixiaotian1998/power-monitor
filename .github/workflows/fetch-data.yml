name: Fetch Power Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from API
        run: |
          mkdir -p data
          curl -s "https://testhouse.lawback.com/api/house/house/device/byUid?deviceType=2&uid=301904" \
            -H "appId: hr" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -H "content-type: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            -o /tmp/api_response.json

      - name: Append to history
        run: |
          mkdir -p data
          if [ ! -f data/history.json ]; then
            echo '[]' > data/history.json
          fi
          node -e "
            const fs = require('fs');
            const resp = JSON.parse(fs.readFileSync('/tmp/api_response.json', 'utf8'));
            const items = (resp.data || []).map(d => ({
              updateTime: d.updateTime,
              leftAmount: d.leftAmount
            }));
            let history = [];
            try { history = JSON.parse(fs.readFileSync('data/history.json', 'utf8')); } catch(e) {}
            const existing = new Set(history.map(h => h.updateTime + '_' + h.leftAmount));
            for (const item of items) {
              const key = item.updateTime + '_' + item.leftAmount;
              if (!existing.has(key)) { history.push(item); existing.add(key); }
            }
            history.sort((a,b) => new Date(a.updateTime) - new Date(b.updateTime));
            fs.writeFileSync('data/history.json', JSON.stringify(history, null, 2));
            console.log('Total records:', history.length);
          "

      - name: Update keepalive
        run: |
          echo "Last run: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .keepalive

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json .keepalive
          if git diff --cached --quiet; then
            echo "No data changes, but keepalive updated."
            git add .keepalive
            git commit -m "Keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            git commit -m "Update power data at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
